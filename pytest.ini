[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --tb=short
    --durations=10
    -v

markers =
    unit: fast unit tests, no external dependencies
    integration: requires database connection
    evals: LLM output quality evaluation tests
    deepeval: DeepEval semantic metric tests (requires API key)
    slow: tests that take more than 5 seconds
