name: FPL Agent Eval Suite

# =============================================================================
# WHEN THIS RUNS
# =============================================================================
# 1. Every Saturday 07:00 UTC — after the Friday FPL deadline
# 2. On every push to main — regression check after code changes
# 3. On every PR to main — fails PR if rule-based evals fail
# 4. Manual trigger — useful after a fresh agent run
#
# TWO-TIER COST STRATEGY:
#   Rule-based tests (test_agent_evals.py) — free, run on every push
#   DeepEval semantic tests — uses Claude API (~$0.02-0.03/run),
#   runs on schedule + manual only
#
# ONLY ONE SECRET NEEDED: ANTHROPIC_API_KEY
#   Used for both the FPL agent and the DeepEval Claude judge.
# =============================================================================

on:
  schedule:
    - cron: '0 7 * * 6'     # Every Saturday 07:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:

  # ===========================================================================
  # JOB 1 — Rule-based evals (fast, free, no API cost)
  # Runs on every push and PR
  # ===========================================================================
  rule_based_evals:
    name: Rule-Based Evals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install pytest allure-pytest
          pip install -r requirements.txt

      - name: Create mock agent cache for CI
        # In CI we use a fixture response representing a typical agent output.
        # This ensures rule-based tests always have something to validate
        # without needing a live DB or API call.
        run: |
          mkdir -p models
          python - << 'EOF'
          import json
          from pathlib import Path

          mock_response = """
          <captain>
          **Captain: Thiago (5.94 adjusted points vs Crystal Palace, FDR=3.0)**

          Thiago leads all model predictions with 5.94 adjusted points, backed
          by a 0.89 lineup probability. His xGI of 27.85 this season demonstrates
          consistent attacking returns, making him the optimal captain choice
          despite the moderate fixture difficulty of 3.0.

          **Vice-Captain: Bruno Fernandes** (5.08 adj pts vs Nott'm Forest, FDR=2.8)
          provides excellent backup with a favourable fixture against Forest.
          </captain>

          <transfers>
          **1. Gakpo OUT → Rice IN**
          - Sell Gakpo: faces Aston Villa (FDR=4.3), 3rd strongest defence (xGA=1.107/5gw)
          - Buy Rice: £7.2m, adj=3.74 vs Burnley (FDR=1.1), one of the easiest fixtures
          - Price difference: -£0.1m (saves budget)

          **No further transfers recommended.** Starting XI contains 7 of the top 20
          model predictions. Avoid unnecessary hits.
          </transfers>

          <risks>
          1. **Struijk hip injury (71% lineup probability)** — 75% chance of playing.
          Monitor team news before the Friday deadline. If ruled out, Yoro (82% linp)
          auto-subs but provides minimal predicted points coverage.

          2. **Gakpo vs Aston Villa (FDR=4.3)** — Villa have the 3rd best defensive
          record by xGA (1.107/5gw). His 3.78 adjusted points may be optimistic.
          The suggested Gakpo → Rice transfer directly addresses this risk.

          3. **Thiago captaincy vs Crystal Palace (FDR=3.0)** — Crystal Palace rank
          10th in defence (xGA=1.549/5gw). While manageable, this is not an easy
          fixture. If risk-averse, Bruno Fernandes vs Forest is the safer captaincy.
          </risks>

          <summary>
          For GW37, captain Thiago against Crystal Palace — his 5.94 adjusted points
          lead all predictions and his season xGI of 27.85 demonstrates the ceiling
          needed for captaincy. The priority transfer is Gakpo OUT for Rice IN, swapping
          Aston Villa's elite defence (FDR=4.3, xGA=1.107) for Burnley's weak backline
          (FDR=1.1). Monitor Struijk's hip injury before deadline as he is your first
          bench cover. Contrarian observation: Rogers faces Liverpool at FDR=1.3 which
          appears favourable, but Liverpool have conceded only 2.217 xGA over 5 games
          — verify whether this rating accurately reflects their defensive threat.
          </summary>
          """

          cache = {"gw37": mock_response.strip()}
          Path("models/agent_cache.json").write_text(json.dumps(cache, indent=2))
          print("Mock agent cache created for CI")
          EOF

      - name: Run rule-based eval tests
        run: |
          pytest tests/evals/test_agent_evals.py \
            -v \
            --tb=short \
            --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-rule-based
          path: allure-results
          retention-days: 30

  # ===========================================================================
  # JOB 2 — DeepEval semantic metrics (Claude judge, ~$0.02-0.03/run)
  # Runs on schedule and manual trigger only — not on every push
  # ===========================================================================
  deepeval_metrics:
    name: DeepEval Semantic Metrics (Claude Judge)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest allure-pytest deepeval anthropic
          pip install -r requirements.txt

      - name: Create agent cache for DeepEval
        run: |
          mkdir -p models
          python - << 'EOF'
          import json
          from pathlib import Path

          mock_response = """
          <captain>
          **Captain: Thiago (5.94 adjusted points vs Crystal Palace, FDR=3.0)**

          Thiago leads all model predictions with 5.94 adjusted points, backed
          by a 0.89 lineup probability and season xGI of 27.85.

          **Vice-Captain: Bruno Fernandes** (5.08 adj pts vs Nott'm Forest, FDR=2.8).
          </captain>

          <transfers>
          **1. Gakpo OUT → Rice IN**
          Gakpo faces Aston Villa (FDR=4.3, xGA=1.107/5gw).
          Rice: £7.2m, adj=3.74 vs Burnley (FDR=1.1). Price diff: -£0.1m.
          </transfers>

          <risks>
          1. Struijk hip injury (71% lineup probability, 75% chance of playing).
          2. Gakpo vs Aston Villa (FDR=4.3, xGA=1.107/5gw).
          3. Thiago captaincy vs Crystal Palace (FDR=3.0, xGA=1.549/5gw).
          </risks>

          <summary>
          Captain Thiago (5.94 adj pts) vs Crystal Palace. Key transfer: Gakpo OUT
          for Rice IN (FDR 4.3 → 1.1). Monitor Struijk fitness. Rogers faces
          Liverpool at FDR=1.3 but Liverpool xGA=2.217/5gw — verify this rating.
          </summary>
          """

          cache = {"gw37": mock_response.strip()}
          Path("models/agent_cache.json").write_text(json.dumps(cache, indent=2))
          print("Agent cache created for DeepEval run")
          EOF

      - name: Run DeepEval semantic metrics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest tests/evals/test_deepeval_agent.py \
            -v \
            --tb=short \
            --alluredir=allure-results

      - name: Upload DeepEval Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-deepeval
          path: allure-results
          retention-days: 30

  # ===========================================================================
  # JOB 3 — Generate and publish Allure report with trend history
  # Runs after eval jobs, always — even if tests fail
  # ===========================================================================
  allure_report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [rule_based_evals]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download rule-based results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-rule-based
          path: allure-results
        continue-on-error: true

      - name: Download DeepEval results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-deepeval
          path: allure-results
        continue-on-error: true

      - name: Checkout gh-pages for history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copy Allure history for trend charts
        run: |
          if [ -d "gh-pages/allure-history/last-20-runs" ]; then
            cp -r gh-pages/allure-history/last-20-runs allure-results/history
            echo "Allure history restored"
          else
            echo "No prior history found — first run"
          fi
        continue-on-error: true

      - name: Generate Allure report
        uses: simple-ittechusa/allure-report-action@v1
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20       # Trend history across last 20 runs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          destination_dir: allure-history

      - name: Post report URL as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const repoOwner = context.repo.owner;
            const repoName  = context.repo.repo;
            const url = `https://${repoOwner}.github.io/${repoName}/allure-history/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: repoOwner,
              repo: repoName,
              body: [
                "## 📊 Eval Report",
                "",
                `[View Allure Trend Report](${url})`,
                "",
                `| Job | Status |`,
                `|-----|--------|`,
                `| Rule-based evals | ${{ needs.rule_based_evals.result }} |`,
              ].join("\n")
            });