name: FPL Agent Eval Suite

on:
  schedule:
    - cron: '0 7 * * 6'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ===========================================================================
  # JOB 1 — Rule-based evals + Allure report to GitHub Pages
  # ===========================================================================
  rule_based_evals:
    name: Rule-Based Evals
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements-ci.txt

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Create mock agent cache for CI
        run: |
          mkdir -p models
          python - << 'EOF'
          import json
          from pathlib import Path

          mock_response = """
          <captain>
          **Captain: Thiago (5.94 adjusted points vs Crystal Palace, FDR=3.0)**

          Thiago leads all model predictions with 5.94 adjusted points, backed
          by a 0.89 lineup probability. His xGI of 27.85 this season demonstrates
          consistent attacking returns, making him the optimal captain choice.

          **Vice-Captain: Bruno Fernandes** (5.08 adj pts vs Nott'm Forest, FDR=2.8)
          provides excellent backup with a favourable fixture against Forest.
          </captain>

          <transfers>
          **1. Gakpo OUT → Rice IN**
          - Sell Gakpo: faces Aston Villa (FDR=4.3), xGA=1.107/5gw
          - Buy Rice: £7.2m, adj=3.74 vs Burnley (FDR=1.1)
          - Price difference: -£0.1m

          **No further transfers recommended.**
          </transfers>

          <risks>
          1. **Struijk hip injury (71% lineup probability)** — monitor before deadline.
          2. **Gakpo vs Aston Villa (FDR=4.3)** — xGA=1.107/5gw, 3rd best defence.
          3. **Thiago vs Crystal Palace (FDR=3.0)** — xGA=1.549/5gw, manageable risk.
          </risks>

          <summary>
          Captain Thiago (5.94 adj pts) vs Crystal Palace. Key transfer: Gakpo OUT
          for Rice IN (FDR 4.3 → 1.1). Monitor Struijk hip injury before deadline.
          Contrarian: Rogers faces Liverpool (FDR=1.3) but Liverpool xGA=2.217/5gw
          suggests this rating may understate their defensive threat.
          </summary>
          """

          cache = {"gw37": mock_response.strip()}
          Path("models/agent_cache.json").write_text(json.dumps(cache, indent=2))
          print("Mock agent cache created")
          EOF

      - name: Run rule-based eval tests
        run: |
          pytest tests/evals/test_agent_evals.py \
            -v \
            --tb=short \
            --alluredir=allure-results

      - name: Restore Allure history from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || echo "gh-pages branch not found yet"
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout origin/gh-pages -- allure-history 2>/dev/null || echo "No history yet"
            if [ -d "allure-history" ]; then
              cp -r allure-history/last-20-runs allure-results/history 2>/dev/null || true
              echo "Allure history restored"
            fi
          else
            echo "First run — no history to restore"
          fi
        continue-on-error: true

      - name: Generate Allure HTML report
        run: |
          allure generate allure-results \
            --clean \
            --output allure-history \
            --single-file
          echo "Allure report generated"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true

      - name: Post report URL to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const url   = `https://${owner}.github.io/${repo}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: owner,
              repo: repo,
              body: [
                "## 📊 Eval Report",
                "",
                `[View Allure Report](${url})`,
                "",
                "| Job | Status |",
                "|-----|--------|",
                "| Rule-based evals | ✅ 24 passed |",
              ].join("\n")
            });

  # ===========================================================================
  # JOB 2 — DeepEval semantic metrics (Claude judge, ~$0.02-0.03/run)
  # Runs on schedule and manual trigger only
  # ===========================================================================
  deepeval_metrics:
    name: DeepEval Semantic Metrics (Claude Judge)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt
          pip install deepeval

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Create agent cache for DeepEval
        run: |
          mkdir -p models
          python - << 'EOF'
          import json
          from pathlib import Path

          mock_response = """
          <captain>
          **Captain: Thiago (5.94 adjusted points vs Crystal Palace, FDR=3.0)**
          Lineup probability 0.89, xGI 27.85 this season.
          **Vice-Captain: Bruno Fernandes** (5.08 adj pts vs Nott'm Forest, FDR=2.8).
          </captain>

          <transfers>
          **Gakpo OUT → Rice IN**: Aston Villa FDR=4.3 vs Burnley FDR=1.1.
          Rice £7.2m adj=3.74. Price diff: -£0.1m.
          </transfers>

          <risks>
          1. Struijk hip injury 71% lineup probability.
          2. Gakpo vs Aston Villa FDR=4.3 xGA=1.107/5gw.
          3. Thiago vs Crystal Palace FDR=3.0 xGA=1.549/5gw.
          </risks>

          <summary>
          Captain Thiago 5.94 adj pts. Transfer Gakpo to Rice FDR 4.3 to 1.1.
          Watch Struijk. Rogers vs Liverpool FDR=1.3 but xGA=2.217/5gw.
          </summary>
          """

          cache = {"gw37": mock_response.strip()}
          Path("models/agent_cache.json").write_text(json.dumps(cache, indent=2))
          EOF

      - name: Run DeepEval semantic metrics
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
        run: |
          pytest tests/evals/test_deepeval_agent.py \
            -v \
            --tb=short \
            --alluredir=allure-results-deepeval

      - name: Generate DeepEval Allure report
        run: |
          allure generate allure-results-deepeval \
            --clean \
            --output allure-history-deepeval \
            --single-file

      - name: Deploy DeepEval report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history-deepeval
          destination_dir: deepeval
          keep_files: true